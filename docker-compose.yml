version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: moveboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: moveboard
    ports:
      - "5432:5432"
    volumes:
      - moveboard_pgdata:/var/lib/postgresql/data

volumes:
  moveboard_pgdata:
